<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — What's New</title>
<link rel="icon" type="image/png" href="/images/birdeye-mark.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/admin-BGMEBgeS.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/style-rkdxeMAh.js">
  <link rel="stylesheet" crossorigin href="/assets/style-CCWZmY19.css">
</head>
<body class="bg-[#FAFAFA] text-ink font-sans antialiased leading-relaxed">

<header class="sticky top-0 z-40 flex h-[60px] items-center justify-between border-b border-border bg-white/90 px-8 backdrop-blur-md max-[680px]:px-4">
  <div class="flex items-center gap-2">
    <img src="/images/birdeye-mark.png?v=2" alt="birdeye" width="24" height="24" class="h-6 w-6 object-contain" />
    <span class="text-[15px] font-semibold">What's New · Admin</span>
  </div>
  <a href="/" target="_blank" class="rounded-[8px] border border-border px-3.5 py-2 text-[13px] font-medium text-ink no-underline transition-colors hover:bg-[#F2F2F2]">View live page →</a>
</header>

<main class="mx-auto max-w-[920px] px-6 py-10 max-[680px]:px-4">

  <!-- Connection panel -->
  <section class="mb-8 rounded-[12px] border border-border bg-white p-6">
    <h2 class="mb-1 text-[18px] font-semibold">Google Sheet connection</h2>
    <p class="mb-4 text-[14px] text-muted">Every page reads live data from this sheet. Paste a Sheet URL to repoint, then fetch tabs to verify.</p>
    <div class="flex flex-wrap items-center gap-2">
      <input id="sheet-url" type="text" placeholder="https://docs.google.com/spreadsheets/d/…" class="min-w-[280px] flex-1 rounded-[8px] border border-border px-3 py-2 text-[14px] outline-none focus:border-brand" />
      <button id="save-sheet" type="button" class="rounded-[8px] bg-ink px-4 py-2 text-[13px] font-medium text-white transition-colors hover:bg-[#333]">Save sheet</button>
      <button id="fetch-tabs" type="button" class="rounded-[8px] border border-border px-4 py-2 text-[13px] font-medium transition-colors hover:bg-[#F2F2F2]">Fetch tabs</button>
    </div>
    <div id="conn-status" class="mt-4 text-[13px]"></div>
  </section>

  <!-- Hero editor -->
  <section class="mb-8 rounded-[12px] border border-border bg-white p-6">
    <h2 class="mb-4 text-[18px] font-semibold">Hero</h2>
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
      <label class="block"><span class="mb-1 block text-[12px] font-medium text-muted">Badge text</span><input data-hero="badge_text" class="w-full rounded-[8px] border border-border px-3 py-2 text-[14px] outline-none focus:border-brand" /></label>
      <label class="block"><span class="mb-1 block text-[12px] font-medium text-muted">Page title</span><input data-hero="page_title" class="w-full rounded-[8px] border border-border px-3 py-2 text-[14px] outline-none focus:border-brand" /></label>
      <label class="block"><span class="mb-1 block text-[12px] font-medium text-muted">Headline line 1</span><input data-hero="headline_line1" class="w-full rounded-[8px] border border-border px-3 py-2 text-[14px] outline-none focus:border-brand" /></label>
      <label class="block"><span class="mb-1 block text-[12px] font-medium text-muted">Headline line 2</span><input data-hero="headline_line2" class="w-full rounded-[8px] border border-border px-3 py-2 text-[14px] outline-none focus:border-brand" /></label>
      <label class="block"><span class="mb-1 block text-[12px] font-medium text-muted">CTA label</span><input data-hero="cta_label" class="w-full rounded-[8px] border border-border px-3 py-2 text-[14px] outline-none focus:border-brand" /></label>
      <label class="block"><span class="mb-1 block text-[12px] font-medium text-muted">CTA URL</span><input data-hero="cta_url" class="w-full rounded-[8px] border border-border px-3 py-2 text-[14px] outline-none focus:border-brand" /></label>
    </div>
    <div class="mt-4 flex items-center gap-3">
      <button id="save-hero" type="button" class="rounded-[8px] bg-brand px-4 py-2 text-[13px] font-medium text-white transition-opacity hover:opacity-90">Save hero</button>
      <span id="hero-status" class="text-[13px] text-muted"></span>
    </div>
  </section>

  <!-- Sections -->
  <section class="mb-8 rounded-[12px] border border-border bg-white p-6">
    <div class="mb-4 flex items-center justify-between">
      <h2 class="text-[18px] font-semibold">Sections</h2>
      <button id="add-section" type="button" class="rounded-[8px] bg-brand px-4 py-2 text-[13px] font-medium text-white transition-opacity hover:opacity-90">+ Add section</button>
    </div>
    <div id="sections-list" class="flex flex-col gap-3"></div>
    <p id="sections-empty" class="text-[14px] text-muted" hidden>No sections yet. Add one to get started.</p>
  </section>

</main>

<!-- Section editor dialog -->
<dialog id="section-dialog" class="w-[min(680px,92vw)] rounded-[14px] border border-border p-0 backdrop:bg-black/40">
  <form id="section-form" method="dialog" class="max-h-[86vh] overflow-y-auto p-6">
    <h3 id="dialog-title" class="mb-4 text-[18px] font-semibold">Edit section</h3>
    <input type="hidden" data-field="id" />

    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
      <label class="block sm:col-span-2"><span class="mb-1 block text-[12px] font-medium text-muted">Title</span><input data-field="title" required class="w-full rounded-[8px] border border-border px-3 py-2 text-[14px] outline-none focus:border-brand" /></label>
      <label class="block"><span class="mb-1 block text-[12px] font-medium text-muted">Label chip</span><input data-field="label" class="w-full rounded-[8px] border border-border px-3 py-2 text-[14px] outline-none focus:border-brand" /></label>
      <label class="block"><span class="mb-1 block text-[12px] font-medium text-muted">Type</span>
        <select data-field="type" class="w-full rounded-[8px] border border-border px-3 py-2 text-[14px] outline-none focus:border-brand">
          <option value="text">Text only</option>
          <option value="image_compare">Image compare (slider)</option>
          <option value="video_compare">Video compare (toggle)</option>
          <option value="color_compare">Color compare</option>
        </select>
      </label>
      <label class="block"><span class="mb-1 block text-[12px] font-medium text-muted">Label background</span><input data-field="labelBg" type="text" placeholder="#EDF5FF" class="w-full rounded-[8px] border border-border px-3 py-2 text-[14px] outline-none focus:border-brand" /></label>
      <label class="block"><span class="mb-1 block text-[12px] font-medium text-muted">Label text color</span><input data-field="labelColor" type="text" placeholder="#0F62FE" class="w-full rounded-[8px] border border-border px-3 py-2 text-[14px] outline-none focus:border-brand" /></label>
      <label class="block sm:col-span-2"><span class="mb-1 block text-[12px] font-medium text-muted">Body (supports **bold**)</span><textarea data-field="body" rows="2" class="w-full rounded-[8px] border border-border px-3 py-2 text-[14px] outline-none focus:border-brand"></textarea></label>
    </div>

    <!-- Media block -->
    <div data-media-block class="mt-4 rounded-[10px] border border-border bg-[#FAFAFA] p-4" hidden>
      <div class="mb-3 text-[12px] font-bold uppercase tracking-[1px] text-faint" data-media-heading>Media</div>
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <div>
          <div class="mb-1 text-[12px] font-medium text-muted" data-before-heading>Before</div>
          <input data-field="beforeMedia" class="mb-2 w-full rounded-[8px] border border-border px-3 py-2 text-[13px] outline-none focus:border-brand" placeholder="URL, /path, or #hex" />
          <div data-media-tools="before" class="flex flex-wrap items-center gap-2 text-[12px]">
            <label class="cursor-pointer rounded-[6px] border border-border px-2.5 py-1 hover:bg-white">Upload<input type="file" data-upload="beforeMedia" accept="image/*,video/*" hidden /></label>
            <button type="button" data-import="beforeMedia" class="rounded-[6px] border border-border px-2.5 py-1 hover:bg-white">Import URL</button>
            <span data-preview="beforeMedia" class="text-faint"></span>
          </div>
        </div>
        <div>
          <div class="mb-1 text-[12px] font-medium text-muted" data-after-heading>After</div>
          <input data-field="afterMedia" class="mb-2 w-full rounded-[8px] border border-border px-3 py-2 text-[13px] outline-none focus:border-brand" placeholder="URL, /path, or #hex" />
          <div data-media-tools="after" class="flex flex-wrap items-center gap-2 text-[12px]">
            <label class="cursor-pointer rounded-[6px] border border-border px-2.5 py-1 hover:bg-white">Upload<input type="file" data-upload="afterMedia" accept="image/*,video/*" hidden /></label>
            <button type="button" data-import="afterMedia" class="rounded-[6px] border border-border px-2.5 py-1 hover:bg-white">Import URL</button>
            <span data-preview="afterMedia" class="text-faint"></span>
          </div>
        </div>
        <label class="block"><span class="mb-1 block text-[12px] font-medium text-muted">Before label</span><input data-field="beforeLabel" class="w-full rounded-[8px] border border-border px-3 py-2 text-[13px] outline-none focus:border-brand" /></label>
        <label class="block"><span class="mb-1 block text-[12px] font-medium text-muted">After label</span><input data-field="afterLabel" class="w-full rounded-[8px] border border-border px-3 py-2 text-[13px] outline-none focus:border-brand" /></label>
      </div>
      <label class="mt-4 block"><span class="mb-1 block text-[12px] font-medium text-muted">Footer (color compare, supports **bold**)</span><input data-field="footer" class="w-full rounded-[8px] border border-border px-3 py-2 text-[13px] outline-none focus:border-brand" /></label>
    </div>

    <!-- Why box -->
    <div class="mt-4 rounded-[10px] border border-border bg-[#FAFAFA] p-4">
      <label class="block"><span class="mb-1 block text-[12px] font-medium text-muted">"Why" box title</span><input data-field="whyTitle" placeholder="Why design needs this" class="w-full rounded-[8px] border border-border px-3 py-2 text-[13px] outline-none focus:border-brand" /></label>
      <div class="mt-3 mb-2 flex items-center justify-between">
        <span class="text-[12px] font-bold uppercase tracking-[1px] text-faint">Bullets</span>
        <button type="button" id="add-bullet" class="rounded-[6px] border border-border px-2.5 py-1 text-[12px] hover:bg-white">+ Add bullet</button>
      </div>
      <div id="bullets-list" class="flex flex-col gap-2"></div>
    </div>

    <label class="mt-4 flex items-center gap-2 text-[13px]"><input type="checkbox" data-field="visible" /> Visible on the live page</label>

    <div class="mt-6 flex items-center justify-between">
      <span id="dialog-error" class="text-[13px] text-[#C0392B]"></span>
      <div class="flex gap-2">
        <button type="button" id="dialog-cancel" class="rounded-[8px] border border-border px-4 py-2 text-[13px] font-medium hover:bg-[#F2F2F2]">Cancel</button>
        <button type="button" id="dialog-save" class="rounded-[8px] bg-brand px-4 py-2 text-[13px] font-medium text-white transition-opacity hover:opacity-90">Save section</button>
      </div>
    </div>
  </form>
</dialog>


</body>
</html>
